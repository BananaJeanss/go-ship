<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Ship!</title>
    <link rel="stylesheet" href="public/style.css" />
  </head>
  <body>
    <header>
      <img src="public/hero.png" alt="Go Ship!" class="hero-image" />
      <div class="hero-stuff">
        <div class="hero-stuff-main">
          <div
            style="
              display: flex;
              flex-direction: column;
              justify-content: start;
              align-items: start;
              margin: 50px 0 0 50px;
            "
          >
            <img src="public/GoShip.png" alt="Go Ship!" class="logo" />
            <div
              style="
                display: flex;
                flex-direction: column;
                justify-content: start;
                align-items: start;
                margin-left: 20px;
              "
            >
              <span class="hero-tagline">
                <img src="public/sailboat.svg" alt="Sailboat" />
                <p class="hero-tagline-text sick-ass-drop-shadow-solid">
                  Ship a Golang project
                </p>
              </span>
              <img src="public/arrow-down.svg" alt="arrow down" />
              <span class="hero-tagline">
                <img src="public/gem.svg" alt="Gem" />
                <p class="hero-tagline-text sick-ass-drop-shadow-solid">
                  Win cool prizes!
                </p>
              </span>
            </div>
          </div>
        </div>
      </div>
    </header>
    <footer>:3</footer>
  </body>
</html>
