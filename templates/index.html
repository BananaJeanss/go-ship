<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Ship!</title>
    <link rel="stylesheet" href="public/style.css" />
  </head>
  <body>
    <header>
      <img src="public/hero.png" alt="Go Ship!" class="hero-image" />
      <a href="https://hackclub.com/"
        ><img
          style="
            position: absolute;
            top: 15px;
            left: 0;
            border: 0;
            width: 256px;
            z-index: 999;
          "
          src="/public/2026.svg"
          alt="Hack Club"
      /></a>

      <div class="hero-stuff">
        <div class="hero-stuff-main">
          <div class="hero-stuff-main-content">
            <img src="public/GoShip.png" alt="Go Ship!" class="logo" />
            <div class="hero-taglines-parent">
              <img src="public/frame.png" alt="Frame" class="tagline-frame" />
              <div class="hero-taglines-parent-parent">
                <div class="hero-taglines">
                  <span class="hero-tagline">
                    <img
                      src="public/sailboat.svg"
                      alt="Sailboat"
                      class="lucide-react-icon"
                    />
                    <p class="hero-tagline-text sick-ass-drop-shadow-solid">
                      Ship a Golang project
                    </p>
                  </span>
                  <img
                    src="public/coolerdotted.png"
                    alt="arrow down"
                    class="dotted-arrow"
                  />
                  <span class="hero-tagline">
                    <img
                      src="public/gem.svg"
                      alt="Gem"
                      class="lucide-react-icon"
                    />
                    <p class="hero-tagline-text sick-ass-drop-shadow-solid">
                      Win cool prizes!
                    </p>
                  </span>
                </div>
                <hr class="hrseperator" />
                {{if not .IsAuthed}}
                <a href="{{ .HCAAuthURL }}">
                  <button class="regbutton rsvp-button">RSVP Now!</button>
                </a>
                {{else}}
                <p class="tyforrsvp">Thanks for RSVPing!</p>
                {{end}}
                <div
                  style="
                    width: 100%;
                    display: flex;
                    flex-direction: row;
                    justify-content: start;
                    align-items: start;
                  "
                ></div>
              </div>
            </div>
            <!-- buttons nd stuff -->
          </div>
        </div>
      </div>
    </header>
    <footer>
      <p>
        <a href="https://hackclub.com" target="_blank"> Hack Club </a>
      </p>
      <div class="verticalseperatorthingy"></div>
      <p>
        <a href="https://github.com/bananajeanss/go-ship" target="_blank">
          Github Repo
        </a>
      </p>
      <div class="verticalseperatorthingy"></div>
      <p>
        Commit:
        <a
          id="ghCommitUrl"
          href="https://github.com/bananajeanss/go-ship/commit/{{ .CommitHash }}"
          target="_blank"
        >
          {{ .CommitHash }}
        </a>
      </p>
      <div class="verticalseperatorthingy"></div>
      <p style="display: flex; flex-direction: row; align-items: center; gap: 5px">
        Built on <a href="https://go.dev/" target="_blank">Go</a> <img src="/public/gopherdraw.png" alt="an masterpiece drawing of the go gopher at like what 42x42 pixels" class="gopherdraw" />
      </p>
    </footer>
  </body>
</html>
